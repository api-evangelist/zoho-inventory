aid: zoho-inventory
name: Zoho Inventory
description: >
  Zoho Inventory is a cloud-based inventory management platform with a REST API for managing items,
  warehouses, sales orders, purchase orders, shipments, stock adjustments, and financial workflows.
  The API enables integration with e-commerce, accounting, and logistics systems and supports
  multi-warehouse operations, serial/batch tracking, and barcode management across global datacenter regions.
